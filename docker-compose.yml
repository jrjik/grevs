version: '3.8'

services:
  db:
    image: postgres:15
    container_name: grevs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: grevs
      POSTGRES_USER: grevs_user
      POSTGRES_PASSWORD: grevs_password
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  